  <style>
    :root {
      --accent: #94B26F; --accent-dark: #6B8E5A; --accent-soft: #E8EFD9;
      --cream: #FAF6EC; --ink: #2D2417; --muted: #8B8567;
      --line: #D5DCC1; --gold: #C9A961; --danger: #B85C5C;
      --shadow: 0 8px 30px rgba(45, 36, 23, 0.08);
      --shadow-hover: 0 14px 44px rgba(107, 142, 90, 0.22);
      --shadow-strong: 0 20px 60px rgba(45, 36, 23, 0.18);
      --radius: 18px; --radius-sm: 10px; --radius-pill: 999px;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --ease: cubic-bezier(.2, .8, .2, 1);
      --transition: 240ms var(--ease);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: var(--font-sans); color: var(--ink); background: var(--cream); line-height: 1.55; -webkit-font-smoothing: antialiased; }
    img, svg, picture { max-width: 100%; display: block; }
    :focus-visible { outline: 3px solid var(--accent-dark); outline-offset: 3px; border-radius: 4px; }
    .skip-link { position: absolute; top: -40px; left: 8px; background: var(--ink); color: var(--cream); padding: 12px 18px; border-radius: 8px; text-decoration: none; z-index: 1000; transition: top var(--transition); }
    .skip-link:focus { top: 8px; }
    button, a.btn, .qty-btn { min-height: 44px; min-width: 44px; }

    .site-header { padding: 24px 20px 12px; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .logo { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
    .logo-mark { width: 44px; height: 44px; border-radius: 12px; background: var(--accent); display: grid; place-items: center; font-family: var(--font-serif); font-weight: 700; font-size: 22px; color: var(--cream); box-shadow: var(--shadow); }
    .logo-text { font-family: var(--font-serif); font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }

    .hero { padding: 40px 20px 60px; background: linear-gradient(180deg, var(--accent-soft) 0%, var(--cream) 100%); text-align: center; }
    .eyebrow { font-family: var(--font-sans); font-size: 12px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--accent-dark); margin: 0 0 14px; }
    .hero h1 { font-family: var(--font-serif); font-weight: 700; font-size: clamp(48px, 9vw, 84px); line-height: 1; color: var(--accent-dark); margin: 0 0 18px; }
    .hero-tagline { font-family: var(--font-serif); font-style: italic; font-size: clamp(20px, 3vw, 26px); color: var(--muted); margin: 0 0 28px; }
    .hero-info { display: inline-flex; flex-wrap: wrap; gap: 6px 14px; justify-content: center; font-size: 14px; color: var(--ink); }
    .hero-info .sep { color: var(--line); }
    .hero-divider { width: 70px; height: 2px; background: var(--gold); margin: 28px auto 0; border: 0; opacity: 0.6; }

    .festival { background: var(--accent); color: var(--cream); padding: 44px 20px; text-align: center; }
    .festival .eyebrow { color: rgba(250, 246, 236, 0.85); }
    .festival h2 { font-family: var(--font-serif); font-weight: 700; font-size: clamp(38px, 7vw, 60px); margin: 0 0 24px; display: inline-block; position: relative; }
    .festival h2 em { font-style: italic; font-weight: 400; }
    .festival h2::before, .festival h2::after { content: ''; position: absolute; top: 50%; width: 50px; height: 1px; background: rgba(250, 246, 236, 0.5); }
    .festival h2::before { right: calc(100% + 16px); }
    .festival h2::after { left: calc(100% + 16px); }
    .price-pill { display: inline-flex; align-items: baseline; gap: 12px; background: var(--cream); color: var(--accent-dark); padding: 14px 32px; border-radius: var(--radius-pill); box-shadow: var(--shadow); font-weight: 700; }
    .price-pill .label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-dark); }
    .price-pill .value { font-size: 28px; font-family: var(--font-serif); }

    .menu { padding: 70px 20px 90px; max-width: 1200px; margin: 0 auto; }
    .menu-header { text-align: center; margin-bottom: 50px; }
    .menu-header h2 { font-family: var(--font-serif); font-weight: 700; font-size: clamp(38px, 6vw, 54px); margin: 0 0 8px; }
    .menu-date { font-family: var(--font-serif); font-style: italic; color: var(--muted); font-size: 18px; }

    .grid { display: grid; gap: 28px; grid-template-columns: 1fr; }
    @media (min-width: 720px) { .grid { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 1080px) { .grid { grid-template-columns: 1fr 1fr 1fr; } }

    .cake { background: #fff; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; transition: transform var(--transition), box-shadow var(--transition); position: relative; }
    .cake:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }

    .cake-media { position: relative; aspect-ratio: 4 / 3; background: var(--accent-soft); overflow: hidden; }
    .cake-media picture, .cake-media img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 400ms var(--ease), transform 600ms var(--ease); }
    .cake:hover .cake-media img { transform: scale(1.04); }
    .cake-media::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, var(--accent-soft) 0%, #f4f0e0 50%, var(--accent-soft) 100%); background-size: 200% 100%; animation: shimmer 1.6s linear infinite; z-index: 0; }
    .cake-media img { z-index: 1; }
    .cake-media img.loaded { animation: fadeIn 400ms var(--ease) both; }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .cake-media .fallback { position: absolute; inset: 0; background: linear-gradient(135deg, var(--accent-soft) 0%, #efe6cf 100%); display: grid; place-items: center; color: var(--accent-dark); font-family: var(--font-serif); font-style: italic; font-size: 18px; z-index: 2; padding: 20px; text-align: center; }

    .cake-tag { position: absolute; top: 12px; right: 12px; background: var(--cream); color: var(--accent-dark); padding: 6px 12px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; box-shadow: var(--shadow); z-index: 3; }
    .cake-body { padding: 22px 22px 24px; flex: 1; display: flex; flex-direction: column; }
    .cake-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 8px; }
    .cake-name { font-family: var(--font-serif); font-weight: 700; font-size: 24px; margin: 0; line-height: 1.15; }
    .cake-price { font-family: var(--font-serif); font-weight: 700; font-size: 22px; color: var(--accent-dark); white-space: nowrap; }
    .cake-price small { font-size: 12px; color: var(--muted); font-weight: 400; display: block; text-align: right; }
    .cake-desc { color: var(--muted); margin: 0 0 14px; font-size: 15px; }
    .cake-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .badge { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; padding: 5px 10px; border-radius: var(--radius-pill); background: var(--accent-soft); color: var(--accent-dark); }
    .badge-fresh { background: rgba(201, 169, 97, 0.18); color: #8a7235; }

    .cake-actions { margin-top: auto; }
    .add-btn { width: 100%; background: var(--accent); color: var(--cream); border: 0; padding: 14px 20px; border-radius: var(--radius-pill); font-family: var(--font-sans); font-weight: 600; font-size: 15px; cursor: pointer; transition: background var(--transition), transform var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .add-btn:hover { background: var(--accent-dark); transform: translateY(-2px); }
    .add-btn:active { transform: translateY(0); }
    .qty-control { display: none; align-items: center; justify-content: space-between; gap: 12px; background: var(--accent-soft); border-radius: var(--radius-pill); padding: 6px; }
    .qty-control.active { display: flex; }
    .qty-btn { width: 44px; height: 44px; border-radius: 50%; border: 0; background: var(--accent); color: var(--cream); font-size: 22px; font-weight: 700; cursor: pointer; display: grid; place-items: center; transition: background var(--transition), transform var(--transition); }
    .qty-btn:hover { background: var(--accent-dark); }
    .qty-btn:active { transform: scale(0.92); }
    .qty-value { font-family: var(--font-serif); font-weight: 700; font-size: 22px; color: var(--accent-dark); min-width: 24px; text-align: center; }

    .how { padding: 80px 20px; background: var(--cream); }
    .how-inner { max-width: 900px; margin: 0 auto; text-align: center; }
    .how h2 { font-family: var(--font-serif); font-weight: 700; font-size: clamp(36px, 5vw, 48px); margin: 0 0 8px; }
    .how-sub { font-family: var(--font-serif); font-style: italic; color: var(--muted); margin: 0 0 50px; }
    .steps { display: grid; gap: 28px; grid-template-columns: 1fr; text-align: left; }
    @media (min-width: 720px) { .steps { grid-template-columns: 1fr 1fr; } }
    .step { display: flex; gap: 18px; align-items: flex-start; }
    .step-num { flex-shrink: 0; width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: var(--cream); display: grid; place-items: center; font-family: var(--font-serif); font-weight: 700; font-size: 20px; }
    .step-text { font-size: 15px; line-height: 1.6; }

    .about { padding: 80px 20px; background: var(--accent-soft); text-align: center; }
    .about-inner { max-width: 720px; margin: 0 auto; }
    .about-photo { width: 180px; height: 180px; border-radius: 50%; margin: 0 auto 28px; background: linear-gradient(135deg, #E8B89C 0%, #B5836A 100%); box-shadow: var(--shadow); overflow: hidden; position: relative; }
    .about-photo img { width: 100%; height: 100%; object-fit: cover; }
    .about-photo .photo-fallback { position: absolute; inset: 0; display: grid; place-items: center; color: rgba(250, 246, 236, 0.85); font-family: var(--font-serif); font-size: 80px; font-weight: 700; }
    .about h2 { font-family: var(--font-serif); font-weight: 700; font-size: clamp(36px, 5vw, 48px); margin: 0 0 20px; }
    .about-text { font-family: var(--font-serif); font-size: 19px; line-height: 1.7; color: var(--ink); }
    .about-sign { font-family: var(--font-serif); font-style: italic; color: var(--muted); margin-top: 18px; }

    .testimonials { padding: 80px 20px; background: var(--cream); }
    .testimonials-inner { max-width: 1100px; margin: 0 auto; text-align: center; }
    .testimonials h2 { font-family: var(--font-serif); font-weight: 700; font-size: clamp(36px, 5vw, 48px); margin: 0 0 40px; }
    .quotes { display: grid; gap: 22px; grid-template-columns: 1fr; text-align: left; }
    @media (min-width: 720px) { .quotes { grid-template-columns: 1fr 1fr 1fr; } }
    .quote { background: var(--accent-soft); padding: 26px 24px; border-radius: var(--radius); border-left: 4px solid var(--accent); }
    .stars { color: var(--gold); font-size: 16px; letter-spacing: 2px; margin-bottom: 12px; }
    .quote-text { font-family: var(--font-serif); font-style: italic; font-size: 17px; line-height: 1.6; color: var(--ink); margin: 0 0 14px; }
    .quote-author { font-size: 13px; color: var(--muted); }

    footer { background: #2D2417; color: var(--cream); padding: 60px 20px 30px; text-align: center; }
    footer .footer-brand { font-family: var(--font-serif); font-weight: 700; font-size: 32px; margin-bottom: 6px; }
    footer .footer-sub { font-family: var(--font-serif); font-style: italic; color: rgba(250, 246, 236, 0.7); margin-bottom: 28px; }
    .footer-links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 24px; }
    .footer-link { display: inline-flex; align-items: center; gap: 8px; background: rgba(250, 246, 236, 0.08); color: var(--cream); padding: 12px 22px; border-radius: var(--radius-pill); text-decoration: none; font-size: 14px; transition: background var(--transition); }
    .footer-link:hover { background: rgba(250, 246, 236, 0.16); }
    .footer-meta { font-size: 12px; color: rgba(250, 246, 236, 0.55); line-height: 1.8; }

    .cart-fab { position: fixed; bottom: 24px; right: 24px; z-index: 100; background: var(--accent); color: var(--cream); border: 0; width: 64px; height: 64px; border-radius: 50%; cursor: pointer; box-shadow: var(--shadow-strong); display: grid; place-items: center; transition: background var(--transition), transform var(--transition); }
    .cart-fab:hover { background: var(--accent-dark); transform: scale(1.05); }
    .cart-fab svg { width: 26px; height: 26px; }
    .cart-fab .badge-count { position: absolute; top: -4px; right: -4px; background: var(--gold); color: var(--ink); font-family: var(--font-sans); font-weight: 700; font-size: 13px; width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transform: scale(0); transition: transform 280ms var(--ease); }
    .cart-fab .badge-count.show { transform: scale(1); }

    .cart-overlay { position: fixed; inset: 0; background: rgba(45, 36, 23, 0.45); opacity: 0; pointer-events: none; transition: opacity var(--transition); z-index: 200; }
    .cart-overlay.open { opacity: 1; pointer-events: auto; }
    .cart-panel { position: fixed; top: 0; right: 0; height: 100vh; width: min(420px, 100%); background: var(--cream); box-shadow: var(--shadow-strong); transform: translateX(100%); transition: transform 320ms var(--ease); z-index: 201; display: flex; flex-direction: column; }
    .cart-panel.open { transform: translateX(0); }
    .cart-header { padding: 22px 22px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); }
    .cart-title { font-family: var(--font-serif); font-weight: 700; font-size: 24px; margin: 0; }
    .cart-close { width: 44px; height: 44px; border: 0; background: transparent; cursor: pointer; border-radius: 50%; display: grid; place-items: center; transition: background var(--transition); }
    .cart-close:hover { background: var(--accent-soft); }
    .cart-close svg { width: 22px; height: 22px; }
    .cart-items { flex: 1; overflow-y: auto; padding: 18px 22px; }
    .cart-empty { text-align: center; padding: 60px 20px; color: var(--muted); font-family: var(--font-serif); font-style: italic; font-size: 18px; }
    .cart-empty svg { width: 60px; height: 60px; margin: 0 auto 16px; opacity: 0.4; }
    .cart-item { display: grid; grid-template-columns: 60px 1fr auto; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--line); align-items: center; }
    .cart-item:last-child { border-bottom: 0; }
    .cart-item-thumb { width: 60px; height: 60px; border-radius: 12px; background: var(--accent-soft); overflow: hidden; display: grid; place-items: center; color: var(--accent-dark); font-family: var(--font-serif); font-weight: 700; font-size: 22px; }
    .cart-item-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-info { min-width: 0; }
    .cart-item-name { font-family: var(--font-serif); font-weight: 700; font-size: 17px; line-height: 1.2; margin-bottom: 4px; }
    .cart-item-price { font-size: 13px; color: var(--muted); }
    .cart-item-controls { display: flex; align-items: center; gap: 8px; }
    .cart-item-controls button { width: 32px; height: 32px; border-radius: 50%; border: 0; background: var(--accent); color: var(--cream); cursor: pointer; font-weight: 700; font-size: 16px; display: grid; place-items: center; min-height: 32px; min-width: 32px; }
    .cart-item-controls button:hover { background: var(--accent-dark); }
    .cart-item-qty { font-family: var(--font-serif); font-weight: 700; font-size: 18px; min-width: 22px; text-align: center; color: var(--accent-dark); }
    .cart-footer { padding: 18px 22px 22px; border-top: 1px solid var(--line); background: #fff; }
    .cart-total { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
    .cart-total-label { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
    .cart-total-value { font-family: var(--font-serif); font-weight: 700; font-size: 30px; color: var(--accent-dark); }
    .cart-checkout { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: #25D366; color: #fff; border: 0; padding: 16px 20px; border-radius: var(--radius-pill); font-family: var(--font-sans); font-weight: 600; font-size: 16px; cursor: pointer; text-decoration: none; transition: background var(--transition), transform var(--transition); }
    .cart-checkout:hover { background: #1eb858; transform: translateY(-2px); }
    .cart-checkout:disabled { background: var(--muted); cursor: not-allowed; transform: none; }
    .cart-note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 10px; }

    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 600ms var(--ease), transform 600ms var(--ease); }
    .reveal.in { opacity: 1; transform: translateY(0); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      html { scroll-behavior: auto; }
    }
  </style>
