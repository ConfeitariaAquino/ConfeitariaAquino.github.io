  <style>
    :root {
      --accent: #94B26F;
      --accent-dark: #6B8E5A;
      --accent-soft: #E8EFD9;
      --cream: #FAF6EC;
      --ink: #2D2417;
      --muted: #8B8567;
      --line: #D5DCC1;
      --gold: #C9A961;
      --danger: #B85C5C;
      --shadow: 0 8px 30px rgba(45, 36, 23, 0.08);
      --shadow-hover: 0 14px 44px rgba(107, 142, 90, 0.22);
      --radius: 18px;
      --radius-sm: 10px;
      --radius-pill: 999px;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --ease: cubic-bezier(.2, .8, .2, 1);
      --transition: 240ms var(--ease);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--cream);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    img, svg, picture { max-width: 100%; display: block; }
    a { color: var(--accent); text-decoration: none; }
    :focus-visible { outline: 3px solid var(--accent-dark); outline-offset: 3px; border-radius: 4px; }

    .skip-link {
      position: absolute; top: -48px; left: 8px;
      background: var(--ink); color: var(--cream);
      padding: 12px 18px; border-radius: 8px;
      z-index: 1000; transition: top var(--transition);
    }
    .skip-link:focus { top: 8px; }

    /* ===== Hero ===== */
    .hero {
      background:
        radial-gradient(circle at 20% 0%, rgba(148, 178, 111, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 100%, rgba(201, 169, 97, 0.12) 0%, transparent 40%),
        linear-gradient(180deg, #F2F6E2 0%, var(--cream) 100%);
      padding: 64px 24px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -80px; left: 50%;
      transform: translateX(-50%); width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(148, 178, 111, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .brand-mark {
      font-family: var(--font-serif); font-style: italic;
      font-size: 14px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px; position: relative;
    }
    .brand-name {
      font-family: var(--font-display);
      font-size: clamp(40px, 8vw, 64px);
      font-weight: 700; color: var(--accent);
      line-height: 1.05; letter-spacing: -0.5px; position: relative;
    }
    .brand-tag {
      font-family: var(--font-serif); font-style: italic;
      font-size: clamp(20px, 3vw, 26px);
      color: var(--ink); margin-top: 6px; position: relative;
    }
    .hero-info {
      margin-top: 28px; font-size: 14px; color: var(--muted);
      line-height: 1.8; position: relative;
    }
    .hero-info strong { color: var(--ink); font-weight: 600; }
    .hero-info .sep { color: var(--line); margin: 0 6px; }
    .hero-divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
      margin: 24px auto 0; opacity: 0.85; position: relative; border: 0;
    }

    /* ===== Festival ribbon ===== */
    .festival-ribbon {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #fff; padding: 28px 24px; text-align: center;
      position: relative; overflow: hidden;
    }
    .festival-eyebrow {
      font-family: var(--font-serif); font-style: italic;
      font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
      opacity: 0.92;
    }
    .festival-title {
      font-family: var(--font-display);
      font-size: clamp(32px, 6vw, 44px);
      font-weight: 700; margin: 4px 0 6px; letter-spacing: 0.5px;
    }
    .festival-title em { font-style: italic; font-weight: 400; font-size: 0.7em; vertical-align: middle; opacity: 0.85; }
    .festival-price {
      display: inline-flex; align-items: baseline; gap: 6px;
      background: #fff; color: var(--accent-dark);
      padding: 10px 22px; border-radius: var(--radius-pill);
      font-weight: 700; margin-top: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    }
    .festival-price small {
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      opacity: 0.75; font-weight: 600;
    }
    .festival-price b { font-size: 22px; }

    /* ===== Section ===== */
    section { padding: 56px 24px; }
    .section-eyebrow {
      font-family: var(--font-serif); font-style: italic;
      font-size: 14px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--accent); text-align: center; margin-bottom: 6px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 40px);
      font-weight: 700; text-align: center; color: var(--ink);
      line-height: 1.15; margin-bottom: 8px;
    }
    .section-date {
      font-family: var(--font-serif); font-style: italic;
      font-size: 18px; color: var(--muted);
      text-align: center; margin-bottom: 32px;
    }

    /* ===== Cake cards ===== */
    .menu {
      max-width: 1080px; margin: 0 auto;
      display: grid; gap: 24px; grid-template-columns: 1fr;
    }
    @media (min-width: 720px) { .menu { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 1080px) { .menu { grid-template-columns: 1fr 1fr 1fr; } }

    .cake {
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      border: 1px solid rgba(213, 220, 193, 0.5);
      display: flex; flex-direction: column;
    }
    .cake:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }

    /* ===== CSS-art cake slices ===== */
    .slice {
      aspect-ratio: 4 / 3; width: 100%;
      position: relative; overflow: hidden;
      background: linear-gradient(180deg, #FBF8EE 0%, #F2EEDD 100%);
      display: flex; align-items: flex-end; justify-content: center;
    }
    .slice-shape {
      position: absolute; bottom: 18%; left: 50%;
      transform: translateX(-50%);
      width: 64%; height: 62%;
      border-radius: 4px 4px 6px 6px;
      box-shadow: 0 8px 18px rgba(45, 36, 23, 0.18);
      overflow: hidden; display: flex; flex-direction: column;
    }
    .slice-layer { width: 100%; flex-shrink: 0; }
    .slice-shadow {
      position: absolute; bottom: 14%; left: 50%;
      transform: translateX(-50%); width: 70%; height: 8px;
      background: radial-gradient(ellipse, rgba(45,36,23,0.18) 0%, transparent 70%);
      filter: blur(2px);
    }
    .slice-topping {
      position: absolute; top: 6%; left: 50%;
      transform: translateX(-50%); z-index: 2;
      font-size: 22px; letter-spacing: 4px;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
    }
    .slice::after {
      content: ''; position: absolute; bottom: 8%; left: 50%;
      transform: translateX(-50%); width: 84%; height: 6px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, #E8E0CC 100%);
      border-radius: 50% 50% 4px 4px / 100% 100% 4px 4px;
      box-shadow: 0 3px 6px rgba(45,36,23,0.1); z-index: 1;
    }

    .layer-paodelo        { background: linear-gradient(180deg, #F4E4B8 0%, #E5D094 100%); }
    .layer-chocolate      { background: linear-gradient(180deg, #4A2A1B 0%, #2E1810 100%); }
    .layer-trufa-branca   { background: linear-gradient(180deg, #FAF4E5 0%, #ECE0C2 100%); }
    .layer-trufa-limao    { background: linear-gradient(180deg, #F8EFA8 0%, #DFD074 100%); }
    .layer-geleia-vermelha{ background: linear-gradient(180deg, #B8243A 0%, #781626 100%); }
    .layer-trufa-brigadeiro{ background: linear-gradient(180deg, #3A1E10 0%, #20100A 100%); }
    .layer-trufa-ninho    { background: linear-gradient(180deg, #FAF0DC 0%, #E8D8B8 100%); }
    .layer-nutella        { background: linear-gradient(180deg, #4A2510 0%, #2C1407 100%); }
    .layer-trufa-maracuja { background: linear-gradient(180deg, #F3CD52 0%, #D6A92C 100%); }
    .layer-trufa-choco50  { background: linear-gradient(180deg, #5C2C18 0%, #3A1A0E 100%); }
    .layer-pudim          { background: linear-gradient(180deg, #F5DC9C 0%, #DBBE6A 100%); }
    .layer-doce-leite     { background: linear-gradient(180deg, #C68638 0%, #8E5A1F 100%); }
    .layer-uva-roxa       { background: linear-gradient(180deg, #6B3A78 0%, #421E48 100%); }
    .layer-merengue       {
      background:
        radial-gradient(circle at 20% 100%, #FFFCF5 8%, transparent 10%),
        radial-gradient(circle at 50% 100%, #FFFCF5 10%, transparent 12%),
        radial-gradient(circle at 80% 100%, #FFFCF5 8%, transparent 10%),
        linear-gradient(180deg, #FFFEF8 0%, #F5EFD9 100%);
    }
    .topping-berries::before    { content: '🍓 🫐 🍓'; }
    .topping-strawberry::before { content: '🍓'; }
    .topping-grape::before      { content: '🍇'; }
    .topping-flake::before      { content: '✦ ✦ ✦'; font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 4px; }

    .slice-tag {
      position: absolute; top: 12px; right: 12px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--accent-dark);
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 10px; border-radius: var(--radius-pill);
      backdrop-filter: blur(2px); z-index: 3;
    }

    .cake-body { padding: 22px 22px 24px; flex: 1; display: flex; flex-direction: column; }
    .cake-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 8px; }
    .cake-name { font-family: var(--font-display); font-size: 21px; font-weight: 700; color: var(--ink); line-height: 1.2; }
    .cake-price { font-family: var(--font-sans); font-size: 17px; font-weight: 700; color: var(--accent-dark); white-space: nowrap; }
    .cake-price small { font-size: 11px; font-weight: 500; color: var(--muted); display: block; text-align: right; letter-spacing: 0.5px; }
    .cake-desc { font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
    .cake-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: var(--radius-pill); font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
    .badge-stock { background: var(--accent-soft); color: var(--accent-dark); }
    .badge-fresh { background: #E8F0E1; color: #4A6B33; }
    .badge-soldout { background: #F4DADA; color: var(--danger); }

    .btn-whatsapp {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; min-height: 44px;
      padding: 14px 20px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-pill);
      font-family: var(--font-sans); font-size: 15px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      margin-top: auto;
      box-shadow: 0 4px 14px rgba(148, 178, 111, 0.35);
      transition: background var(--transition), transform 150ms var(--ease), box-shadow var(--transition);
    }
    .btn-whatsapp:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(107, 142, 90, 0.45); }
    .btn-whatsapp:active { transform: scale(0.98); }
    .btn-whatsapp[aria-disabled="true"] { background: var(--muted); cursor: not-allowed; box-shadow: none; }
    .btn-whatsapp svg { width: 18px; height: 18px; }

    /* ===== Como funciona ===== */
    .how { background: #fff; }
    .steps { max-width: 720px; margin: 0 auto; display: grid; gap: 20px; }
    @media (min-width: 720px) { .steps { grid-template-columns: 1fr 1fr; } }
    .step { display: flex; gap: 16px; align-items: flex-start; }
    .step-num {
      flex-shrink: 0; width: 38px; height: 38px; border-radius: 50%;
      background: var(--accent-soft); color: var(--accent-dark);
      font-family: var(--font-display); font-size: 18px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .step-text { font-size: 15px; line-height: 1.5; padding-top: 6px; }
    .step-text strong { color: var(--ink); }

    /* ===== Sobre ===== */
    .about { background: linear-gradient(180deg, var(--cream) 0%, var(--accent-soft) 100%); }
    .about-content { max-width: 560px; margin: 0 auto; text-align: center; }
    .about-photo {
      width: 160px; height: 160px; border-radius: 50%;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #E8B89C 0%, #B5836A 100%);
      box-shadow: var(--shadow);
      border: 4px solid #fff;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      font-family: var(--font-display);
      font-size: 64px; font-weight: 700;
      color: rgba(255,255,255,0.95);
    }
    .about-photo img { width: 100%; height: 100%; object-fit: cover; }
    .about-text {
      font-family: var(--font-serif); font-size: 19px;
      line-height: 1.55; color: var(--ink);
      font-style: italic; margin-top: 18px;
    }
    .about-sign { font-family: var(--font-serif); font-style: italic; font-size: 22px; color: var(--accent-dark); margin-top: 18px; }

    /* ===== Depoimentos ===== */
    .testimonials { background: #fff; }
    .testimonial-grid { max-width: 1080px; margin: 0 auto; display: grid; gap: 18px; grid-template-columns: 1fr; }
    @media (min-width: 720px) { .testimonial-grid { grid-template-columns: 1fr 1fr 1fr; } }
    .testimonial { padding: 22px; background: var(--cream); border-radius: var(--radius); border-left: 4px solid var(--accent); }
    .stars { color: var(--gold); font-size: 14px; margin-bottom: 8px; letter-spacing: 2px; }
    .testimonial-text { font-family: var(--font-serif); font-style: italic; font-size: 17px; line-height: 1.5; color: var(--ink); margin-bottom: 10px; }
    .testimonial-author { font-size: 13px; color: var(--muted); font-weight: 500; }

    /* ===== Footer ===== */
    footer { background: var(--ink); color: #E8D7DD; padding: 48px 24px 96px; text-align: center; }
    footer .footer-brand { font-family: var(--font-display); font-size: 24px; color: #fff; margin-bottom: 4px; }
    footer .footer-tag { font-family: var(--font-serif); font-style: italic; font-size: 16px; color: var(--accent-soft); margin-bottom: 24px; }
    .footer-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }
    .footer-link {
      color: #E8D7DD; font-size: 14px;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      border: 1px solid rgba(232, 215, 221, 0.25);
      border-radius: var(--radius-pill);
      transition: background var(--transition), border-color var(--transition);
    }
    .footer-link:hover { background: rgba(232, 215, 221, 0.08); border-color: rgba(232, 215, 221, 0.5); }
    .footer-link svg { width: 14px; height: 14px; }
    .footer-meta { font-size: 12px; color: rgba(232, 215, 221, 0.55); line-height: 1.7; }

    /* ===== Sticky WhatsApp button ===== */
    .floating-cta {
      position: fixed; bottom: 18px; right: 18px;
      width: 56px; height: 56px; border-radius: 50%;
      background: #25D366; color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 24px rgba(37, 211, 102, 0.4);
      z-index: 100;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .floating-cta:hover { transform: scale(1.08); }
    .floating-cta svg { width: 28px; height: 28px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>

  <a class="skip-link" href="#cardapio">Pular para o cardápio</a>

  <header class="hero">
    <div class="brand-mark">Bolos Artesanais</div>
    <h1 class="brand-name">Aquino Confeitaria</h1>
    <div class="brand-tag">feitos hoje, com carinho</div>
    <div class="hero-info">
      <strong>Pronta entrega</strong><span class="sep">·</span>Fornadas pequenas<span class="sep">·</span>
      Pedidos até <strong>16h</strong><span class="sep">·</span>Retirada das <strong>14h às 19h</strong>
    </div>
    <hr class="hero-divider" />
  </header>

  <div class="festival-ribbon">
    <div class="festival-eyebrow">Cardápio do dia</div>
    <h2 class="festival-title">Festival <em>de</em> Fatias</h2>
    <div class="festival-price">
      <small>Fatias</small>
      <b>R$ 22,00</b>
    </div>
  </div>

  <main>
